{{ $title := printf "%s - %s" .Title site.Title }}
{{ $url := .Permalink }}

<div class="share-wrapper d-flex align-items-center">
  <span class="share-label text-muted">공유하기</span>
  <span class="share-icons">
    <a
      href="https://twitter.com/intent/tweet?text={{ $title }}&amp;url={{ $url }}"
      target="_blank"
      rel="noopener"
      title="Twitter"
      aria-label="Twitter"
    >
      <i class="fa-fw fa-brands fa-square-x-twitter"></i>
    </a>
    <a
      href="https://www.facebook.com/sharer/sharer.php?u={{ $url }}"
      target="_blank"
      rel="noopener"
      title="Facebook"
      aria-label="Facebook"
    >
      <i class="fa-fw fab fa-facebook-square"></i>
    </a>
    <a
      href="https://t.me/share/url?url={{ $url }}&amp;text={{ $title }}"
      target="_blank"
      rel="noopener"
      title="Telegram"
      aria-label="Telegram"
    >
      <i class="fa-fw fab fa-telegram"></i>
    </a>
    <button
      class="btn small copy-link"
      type="button"
      data-copy-url="{{ .Permalink }}"
      title="링크 복사"
      aria-label="링크 복사"
    >
      <i class="fa-fw fas fa-link pe-none fs-6"></i>
    </button>
  </span>
</div>
